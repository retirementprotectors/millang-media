<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Millang Media CRM</title>
<style>
:root {
  --navy: #1e3a5f;
  --navy-dark: #152b47;
  --accent: #3b82f6;
  --accent-light: #eff6ff;
  --white: #ffffff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --green: #16a34a;
  --green-light: #dcfce7;
  --green-dark: #15803d;
  --yellow: #d97706;
  --yellow-light: #fef3c7;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --red: #dc2626;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }

/* NAV */
.navbar { background: var(--navy); padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.nav-brand { color: var(--white); font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; }
.nav-brand span { color: var(--accent); }
.nav-actions { display: flex; gap: .75rem; align-items: center; }
.btn { padding: .5rem 1rem; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; border: none; transition: all .2s; font-family: inherit; }
.btn-primary { background: var(--accent); color: var(--white); }
.btn-primary:hover { background: #2563eb; }
.btn-outline-w { background: transparent; color: var(--white); border: 1.5px solid rgba(255,255,255,.3); }
.btn-outline-w:hover { background: rgba(255,255,255,.1); }
.btn-sm { padding: .35rem .7rem; font-size: .78rem; }
.btn-danger { background: var(--red); color: var(--white); }
.btn-danger:hover { opacity: .9; }

/* KPI BAR */
.kpi-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem 1.5rem; background: var(--white); border-bottom: 1px solid var(--gray-200); }
.kpi { text-align: center; padding: .75rem; }
.kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--navy); }
.kpi-value.green { color: var(--green); }
.kpi-label { font-size: .75rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: .15rem; }
@media (max-width: 600px) { .kpi-bar { grid-template-columns: repeat(2, 1fr); } }

/* BOARD */
.board { display: flex; gap: 1rem; padding: 1rem 1.5rem; overflow-x: auto; min-height: calc(100vh - 160px); align-items: flex-start; }
.column { min-width: 260px; max-width: 300px; flex: 1; background: var(--gray-50); border-radius: var(--radius); border: 1px solid var(--gray-200); display: flex; flex-direction: column; max-height: calc(100vh - 180px); }
.column-header { padding: .75rem 1rem; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; background: inherit; border-radius: var(--radius) var(--radius) 0 0; }
.column-count { background: var(--gray-200); color: var(--gray-700); padding: .1rem .5rem; border-radius: 100px; font-size: .75rem; }
.column-cards { padding: .5rem; flex: 1; overflow-y: auto; min-height: 60px; }
.col-new .column-header { color: var(--gray-500); }
.col-contacted .column-header { color: var(--accent); }
.col-interested .column-header { color: var(--yellow); }
.col-proposal .column-header { color: var(--orange); }
.col-client .column-header { color: var(--green); }
.col-live .column-header { color: var(--green-dark); }

/* CARDS */
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 8px; padding: .75rem; margin-bottom: .5rem; cursor: grab; transition: box-shadow .2s, transform .15s; border-left: 3px solid var(--gray-300); }
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.card.dragging { opacity: .5; transform: rotate(2deg); }
.card-name { font-size: .88rem; font-weight: 700; color: var(--gray-900); margin-bottom: .25rem; }
.card-city { font-size: .75rem; color: var(--gray-400); margin-bottom: .4rem; }
.card-phone { font-size: .8rem; color: var(--accent); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: .25rem; }
.card-phone:hover { text-decoration: underline; }
.card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: .5rem; }
.card-rating { font-size: .75rem; color: var(--gray-500); }
.card-rating .star { color: #f59e0b; }
.card-tier { font-size: .7rem; padding: .15rem .4rem; border-radius: 4px; font-weight: 600; background: var(--gray-100); color: var(--gray-500); }
.card-tier.launch { background: var(--accent-light); color: var(--accent); }
.card-tier.growth { background: var(--yellow-light); color: var(--yellow); }
.card-tier.pro { background: var(--orange-light); color: var(--orange); }
.card-notes { font-size: .75rem; color: var(--gray-400); margin-top: .35rem; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-date { font-size: .7rem; color: var(--gray-400); margin-top: .25rem; }
.col-contacted .card { border-left-color: var(--accent); }
.col-interested .card { border-left-color: var(--yellow); }
.col-proposal .card { border-left-color: var(--orange); }
.col-client .card { border-left-color: var(--green); }
.col-live .card { border-left-color: var(--green-dark); }

/* DROP ZONE */
.column-cards.drag-over { background: var(--accent-light); border-radius: 6px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 2rem; width: 90%; max-width: 500px; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
.form-group { margin-bottom: .85rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.form-group label { display: block; font-size: .78rem; font-weight: 600; color: var(--gray-700); margin-bottom: .3rem; }
.form-group input, .form-group select, .form-group textarea { width: 100%; font-family: inherit; font-size: .88rem; padding: .55rem .75rem; border: 1.5px solid var(--gray-200); border-radius: 8px; outline: none; transition: border-color .2s; background: var(--gray-50); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); background: var(--white); }
.form-group textarea { resize: vertical; min-height: 70px; }
.modal-actions { display: flex; justify-content: space-between; margin-top: 1.25rem; gap: .75rem; }
.modal-actions .btn { flex: 1; }

/* SEARCH */
.search-bar { padding: .5rem 1.5rem; background: var(--white); border-bottom: 1px solid var(--gray-200); }
.search-input { width: 100%; padding: .5rem .75rem; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: .88rem; outline: none; font-family: inherit; background: var(--gray-50); }
.search-input:focus { border-color: var(--accent); background: var(--white); }

/* FOOTER */
.footer { text-align: center; padding: 1rem; font-size: .75rem; color: var(--gray-400); }

@media (max-width: 768px) {
  .board { padding: .75rem; gap: .75rem; }
  .column { min-width: 220px; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-brand">Millang<span>Media</span> CRM</div>
  <div class="nav-actions">
    <button class="btn btn-outline-w btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Prospect</button>
  </div>
</div>

<div class="kpi-bar">
  <div class="kpi"><div class="kpi-value" id="kpi-total">0</div><div class="kpi-label">Total Prospects</div></div>
  <div class="kpi"><div class="kpi-value" id="kpi-pipeline">$0</div><div class="kpi-label">Pipeline Value</div></div>
  <div class="kpi"><div class="kpi-value green" id="kpi-clients">0</div><div class="kpi-label">Active Clients</div></div>
  <div class="kpi"><div class="kpi-value green" id="kpi-mrr">$0</div><div class="kpi-label">Monthly Revenue</div></div>
</div>

<div class="search-bar">
  <input type="text" class="search-input" id="search" placeholder="Search prospects by name, city, or phone..." oninput="renderBoard()">
</div>

<div class="board" id="board">
  <div class="column col-new" data-stage="NEW">
    <div class="column-header">New <span class="column-count" id="count-NEW">0</span></div>
    <div class="column-cards" id="cards-NEW"></div>
  </div>
  <div class="column col-contacted" data-stage="CONTACTED">
    <div class="column-header">Contacted <span class="column-count" id="count-CONTACTED">0</span></div>
    <div class="column-cards" id="cards-CONTACTED"></div>
  </div>
  <div class="column col-interested" data-stage="INTERESTED">
    <div class="column-header">Interested <span class="column-count" id="count-INTERESTED">0</span></div>
    <div class="column-cards" id="cards-INTERESTED"></div>
  </div>
  <div class="column col-proposal" data-stage="PROPOSAL">
    <div class="column-header">Proposal <span class="column-count" id="count-PROPOSAL">0</span></div>
    <div class="column-cards" id="cards-PROPOSAL"></div>
  </div>
  <div class="column col-client" data-stage="CLIENT">
    <div class="column-header">Client <span class="column-count" id="count-CLIENT">0</span></div>
    <div class="column-cards" id="cards-CLIENT"></div>
  </div>
  <div class="column col-live" data-stage="LIVE">
    <div class="column-header">Live <span class="column-count" id="count-LIVE">0</span></div>
    <div class="column-cards" id="cards-LIVE"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Add Prospect</h2>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group"><label>Business Name *</label><input type="text" id="f-name" required></div>
      <div class="form-group"><label>Contact Name</label><input type="text" id="f-contact"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input type="tel" id="f-phone"></div>
      <div class="form-group"><label>Email</label><input type="email" id="f-email"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>City</label><input type="text" id="f-city"></div>
      <div class="form-group"><label>State</label><input type="text" id="f-state" value="IA"></div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="f-address"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Stage</label>
        <select id="f-stage"><option>NEW</option><option>CONTACTED</option><option>INTERESTED</option><option>PROPOSAL</option><option>CLIENT</option><option>LIVE</option></select>
      </div>
      <div class="form-group">
        <label>Tier Interest</label>
        <select id="f-tier"><option value="">Unknown</option><option value="launch">Launch</option><option value="growth">Growth</option><option value="pro">Pro</option></select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="btn-delete" onclick="deleteProspect()" style="display:none;flex:0 0 auto;padding:.5rem .75rem;">Delete</button>
      <div style="flex:1"></div>
      <button class="btn btn-outline-w btn-sm" onclick="closeModal()" style="color:var(--gray-500);border-color:var(--gray-300)">Cancel</button>
      <button class="btn btn-primary" onclick="saveProspect()">Save</button>
    </div>
  </div>
</div>

<div class="footer">Millang Media CRM — Powered by Millang Media</div>

<script>
// SEED DATA
const SEED = [

{name:"Bob's Sewerooter Services",address:"4677 NE 38th St",city:"Des Moines",state:"IA",phone:"(515) 262-6520",rating:"4.8",reviews:126},

{name:"Broich Plumbing LLC",address:"2502 SW 31st St",city:"Ankeny",state:"IA",phone:"(515) 229-8635",rating:"3.4",reviews:10},

{name:"Golden Rule Plumbing Heating & Cooling",address:"102 N Jefferson Way",city:"Indianola",state:"IA",phone:"(888) 986-2424",rating:"3.9",reviews:7},
{name:"Lifestyle Plumbing",address:"707 Collins Dr",city:"Waukee",state:"IA",phone:"(515) 987-4193",rating:"5.0",reviews:6},
{name:"Mikes Plumbing & Backhoe Service LLC",address:"3802 25th Ave",city:"Cumming",state:"IA",phone:"(515) 208-3681",rating:"3.7",reviews:6},
{name:"Bendon Plumbing Heating and AC",address:"717 W 2nd Ave",city:"Indianola",state:"IA",phone:"(515) 962-5016",rating:"4.3",reviews:6},
{name:"G & S Plumbing",address:"8090 NE 30th Pl",city:"Altoona",state:"IA",phone:"(515) 975-7515",rating:"4.4",reviews:5},
{name:"Above the Radar Resource",address:"405 3rd St NE",city:"Mitchellville",state:"IA",phone:"(515) 202-6632",rating:"4.0",reviews:5},
{name:"Des Moines Plumbing",address:"3419 1st St UNIT 7",city:"Des Moines",state:"IA",phone:"(515) 346-6891",rating:"4.3",reviews:4},
{name:"10G Heating Cooling Plumbing",address:"265 Garfield Ave",city:"Elkhart",state:"IA",phone:"(641) 373-2174",rating:"5.0",reviews:4},
{name:"Kevin's Plumbing",address:"325 N Market St",city:"Madrid",state:"IA",phone:"(515) 795-4050",rating:"5.0",reviews:3},
{name:"Drain Pro Plumbing",address:"325 N Market St",city:"Madrid",state:"IA",phone:"(515) 402-8929",rating:"5.0",reviews:2},
{name:"Sneller Plumbing Heating Services",address:"110 N Marshall St",city:"Prairie City",state:"IA",phone:"(515) 994-2283",rating:"2.5",reviews:2},
{name:"Clarks Plumbing Inc",address:"608 N NW 8th St",city:"Grimes",state:"IA",phone:"(515) 986-4545",rating:"5.0",reviews:1},
{name:"Walls Plumbing & Handyman Services",address:"600 E 4th St N",city:"Newton",state:"IA",phone:"(641) 275-7252",rating:"5.0",reviews:1},
{name:"Golden Rule Plumbing",address:"Norwalk",city:"Norwalk",state:"IA",phone:"(515) 981-5710",rating:"N/A",reviews:0},
{name:"Madison County Plumbing Heating",address:"108 W Jefferson St",city:"Winterset",state:"IA",phone:"(515) 462-3467",rating:"N/A",reviews:0},
{name:"Carstens Plumbing & Heating & AC",address:"307 SE 4th St",city:"Panora",state:"IA",phone:"(641) 755-3805",rating:"N/A",reviews:0},
{name:"Firebaugh Plumbing",address:"406 NE 2nd St",city:"Panora",state:"IA",phone:"(641) 755-3665",rating:"N/A",reviews:0},
{name:"TLI Plumbing LLC",address:"196 50th Ave",city:"Prairie City",state:"IA",phone:"(515) 238-2977",rating:"N/A",reviews:0}
];

const STAGES = ['NEW','CONTACTED','INTERESTED','PROPOSAL','CLIENT','LIVE'];
const TIER_MONTHLY = { launch: 150, growth: 250, pro: 350 };
const TIER_SETUP = { launch: 500, growth: 1000, pro: 1500 };
const KEY = 'mm_crm_prospects';

function load() {
  const stored = localStorage.getItem(KEY);
  if (stored) return JSON.parse(stored);
  return SEED.map((p, i) => ({
    id: Date.now() + i,
    name: p.name,
    contact: '',
    phone: p.phone,
    email: '',
    address: p.address,
    city: p.city,
    state: p.state,
    rating: p.rating,
    reviews: p.reviews,
    stage: 'NEW',
    tier: '',
    notes: '',
    lastContacted: '',
    created: new Date().toISOString().split('T')[0]
  }));
}

function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

let prospects = load();
save(prospects);

function updateKPIs() {
  const total = prospects.length;
  const interested = prospects.filter(p => p.stage === 'INTERESTED' || p.stage === 'PROPOSAL');
  const clients = prospects.filter(p => p.stage === 'CLIENT' || p.stage === 'LIVE');
  const liveClients = prospects.filter(p => p.stage === 'LIVE');
  const pipelineValue = interested.length * 1000;
  let mrr = 0;
  liveClients.forEach(c => { mrr += TIER_MONTHLY[c.tier] || 250; });
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-pipeline').textContent = '$' + pipelineValue.toLocaleString();
  document.getElementById('kpi-clients').textContent = clients.length;
  document.getElementById('kpi-mrr').textContent = '$' + mrr.toLocaleString() + '/mo';
}

function renderBoard() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = prospects.filter(p => 
    p.name.toLowerCase().includes(q) || 
    p.city.toLowerCase().includes(q) || 
    p.phone.includes(q) ||
    (p.contact && p.contact.toLowerCase().includes(q))
  );
  STAGES.forEach(stage => {
    const container = document.getElementById('cards-' + stage);
    const stageProspects = filtered.filter(p => p.stage === stage);
    document.getElementById('count-' + stage).textContent = stageProspects.length;
    container.innerHTML = stageProspects.map(p => `
      <div class="card" draggable="true" data-id="${p.id}" onclick="openModal(${p.id})"
           ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-city">${esc(p.city)}, ${esc(p.state)}</div>
        ${p.phone ? `<a class="card-phone" href="tel:${p.phone.replace(/[^\d+]/g,'')}" onclick="event.stopPropagation()">&#128222; ${esc(p.phone)}</a>` : ''}
        <div class="card-meta">
          ${p.rating && p.rating !== 'N/A' ? `<span class="card-rating"><span class="star">&#9733;</span> ${p.rating} (${p.reviews})</span>` : '<span class="card-rating">No reviews</span>'}
          ${p.tier ? `<span class="card-tier ${p.tier}">${p.tier.charAt(0).toUpperCase()+p.tier.slice(1)}</span>` : ''}
        </div>
        ${p.notes ? `<div class="card-notes">${esc(p.notes)}</div>` : ''}
        ${p.lastContacted ? `<div class="card-date">Last contact: ${p.lastContacted}</div>` : ''}
      </div>
    `).join('');
  });
  updateKPIs();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// DRAG & DROP
let dragId = null;
function onDragStart(e) {
  dragId = parseInt(e.target.dataset.id);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.target.classList.remove('dragging'); dragId = null; }

document.querySelectorAll('.column-cards').forEach(col => {
  col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
  col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (dragId === null) return;
    const newStage = col.id.replace('cards-', '');
    const p = prospects.find(x => x.id === dragId);
    if (p) {
      p.stage = newStage;
      if (newStage !== 'NEW' && !p.lastContacted) p.lastContacted = new Date().toISOString().split('T')[0];
      save(prospects);
      renderBoard();
    }
  });
});

// MODAL
function openModal(id) {
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const delBtn = document.getElementById('btn-delete');
  if (id) {
    const p = prospects.find(x => x.id === id);
    if (!p) return;
    title.textContent = 'Edit: ' + p.name;
    document.getElementById('edit-id').value = p.id;
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-contact').value = p.contact || '';
    document.getElementById('f-phone').value = p.phone || '';
    document.getElementById('f-email').value = p.email || '';
    document.getElementById('f-city').value = p.city || '';
    document.getElementById('f-state').value = p.state || 'IA';
    document.getElementById('f-address').value = p.address || '';
    document.getElementById('f-stage').value = p.stage;
    document.getElementById('f-tier').value = p.tier || '';
    document.getElementById('f-notes').value = p.notes || '';
    delBtn.style.display = 'block';
  } else {
    title.textContent = 'Add Prospect';
    document.getElementById('edit-id').value = '';
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = '');
    document.getElementById('f-state').value = 'IA';
    document.getElementById('f-stage').value = 'NEW';
    document.getElementById('f-tier').value = '';
    delBtn.style.display = 'none';
  }
  overlay.classList.add('active');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function saveProspect() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const editId = document.getElementById('edit-id').value;
  if (editId) {
    const p = prospects.find(x => x.id === parseInt(editId));
    if (p) {
      p.name = name;
      p.contact = document.getElementById('f-contact').value.trim();
      p.phone = document.getElementById('f-phone').value.trim();
      p.email = document.getElementById('f-email').value.trim();
      p.city = document.getElementById('f-city').value.trim();
      p.state = document.getElementById('f-state').value.trim();
      p.address = document.getElementById('f-address').value.trim();
      p.stage = document.getElementById('f-stage').value;
      p.tier = document.getElementById('f-tier').value;
      p.notes = document.getElementById('f-notes').value.trim();
    }
  } else {
    prospects.push({
      id: Date.now(),
      name: name,
      contact: document.getElementById('f-contact').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      address: document.getElementById('f-address').value.trim(),
      city: document.getElementById('f-city').value.trim(),
      state: document.getElementById('f-state').value.trim() || 'IA',
      rating: 'N/A',
      reviews: 0,
      stage: document.getElementById('f-stage').value,
      tier: document.getElementById('f-tier').value,
      notes: document.getElementById('f-notes').value.trim(),
      lastContacted: '',
      created: new Date().toISOString().split('T')[0]
    });
  }
  save(prospects);
  renderBoard();
  closeModal();
}

function deleteProspect() {
  const editId = parseInt(document.getElementById('edit-id').value);
  if (!editId) return;
  if (!confirm('Delete this prospect?')) return;
  prospects = prospects.filter(p => p.id !== editId);
  save(prospects);
  renderBoard();
  closeModal();
}

function exportCSV() {
  const headers = ['name','contact','phone','email','address','city','state','stage','tier','rating','reviews','notes','lastContacted'];
  const rows = prospects.map(p => headers.map(h => '"' + (p[h]||'').toString().replace(/"/g,'""') + '"').join(','));
  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'millang-media-prospects-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

// Keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
renderBoard();
</script>
</body>
</html>
